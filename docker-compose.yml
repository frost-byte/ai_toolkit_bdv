version: "0.1"

services:
  ai-toolkit:
    image: frostbyt3/ai_toolkit_bdv:latest
    restart: unless-stopped
    ports:
      - "8675:8675"
    volumes:
      - ~/.cache/huggingface/hub:/root/.cache/huggingface/hub
      - ./aitk_db.db:/app/ai-toolkit-bdv/aitk_db.db
      - ./datasets:/app/ai-toolkit-bdv/datasets
      - ./output:/app/ai-toolkit-bdv/output
      - ./config:/app/ai-toolkit-bdv/config
    environment:
      - AI_TOOLKIT_AUTH=${AI_TOOLKIT_AUTH:-password}
      - NODE_ENV=production
      - TZ=UTC
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
